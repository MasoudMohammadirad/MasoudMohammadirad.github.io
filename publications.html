  title: "Pronominal clitics in Western Iranian languages: Description, mapping, and typological implications",
  abstract: "Pronominal clitics comprise one of the important traits of the majority of West Iranian languages. Nevertheless, while these person clitics have been the subject of virtually systematic studies in certain languages, e.g. Central Kurdish dialects, and Persian, they are hardly studied in the majority of languages where they are attested. More specifically, the existing scholarship has faintly dealt with the rise of procliticization, the development of person marking system, the placement of clitics, the cluster internal ordering of clitics, and the clitic-affix combinations. This study is an attempt to fill the lack of knowledge across the aspects mentioned. The development of proclitic attachment forms an integral part of the thesis. Originally enclitics in the second position in the sense of Wackernagel, a subset of West Iranian languages have developed proclitics. The hypothesis postulated in the thesis is that this evolution results from a change in the domain of cliticization, more precisely, the abandonment of the clause as the domain of cliticization. This shift in turn leads to the reanalysis of the clause-initial particles, hosts of the second position clitics, and their integration into the clitic paradigm. Having lost their host, the second position clitics change their attachment orientation and become incorporated into the element which follows them in the form of proclitics. Proclitic attachment is thus a secondary development from erstwhile second positioning of enclitics (Steele 1977; Wanner 1987). The person marking system points to the inverse development of subject indexing and object indexing in the past transitive constructions: in the former, the original ‘pronominal’ clitics have grammaticalized into markers of agreement, further pointing to the cross-linguistic tendency for subject agreement (Siewierska 1999; Haig 2018a). In the latter, the originally object agreement inflectional affixes on the verb are lending/have lent themselves to varying degrees of deinflectionalization (Norde 2009; Haig 2018a), hence deviating from the typological tendencies in associating inflectional affixes with the agreement relation (Siewierska 2004). Three domains are accountable for clitic placement across WILs: the clause, the verb phrase (VP), and the verb. A subgroup of VP-based clitic systems provides a rich source for the study of endoclitics: the endoclitics of the latter are the result of the interplay between second position requirement for clitics and the stress factor. V-based proclitic systems are characterised by ditropic attachment of clitics. The cluster internal ordering of clitics is determined by argument hierarchy (A > O > R > POS) across Iranian: the argument ranked higher in the hierarchy appears second in the cluster. This property brings Iranian languages close to Romance languages (Gerlach 2002). Finally, in some clitic-affix combinations, clitics interrupt morphological words, further overshadowing a categorical distinction between the categories of clitics and affixes on the one hand, and the concept of wordhood on the other (Haspelmath 2011).",

  abstract: "While the loss of subject agreement is often related to general processes of phonological attrition, the processes by which subject agreement emerges remain disputed. This paper tests one of the most influential approaches, the “topic shift” account of Givón (1976, 2017), which identifies a pragmatically-marked construction signaling topic discontinuity as the point from which subject agreement initially spreads. We investigate subject indexing in Hewramî, a West Iranian language, which exhibits differential subject indexing in past transitive constructions. Historically, West Iranian languages lost subject agreement in these constructions, but retained it elsewhere. Most contemporary languages have since restored subject agreement in past transitives, but in Hewramî such innovated subject indexing is not fully grammaticalized. We combine quantitative and qualitative methodologies on a sample of 2005 past transitive clauses from spoken Hewramî in order to identify the factors that influence the presence of an index. The quantitative analysis reveals that subject indexing is overall favoured in clauses that exhibit topic continuity, in particular those otherwise lacking an overt subject NP. In clauses with an overt subject NP, it is features associated with focus, rather than topic continuity, that inhibit indexing. We also find effects of person and animacy, with indexing most frequent with first and second person, and other human subjects. We find no evidence for the claim that a pragmatically marked construction for marking “topic shift” provided a model construction for these developments. Our findings constitute a novel and empirically well-grounded contribution to one of the most widely-researched domains of diachronic morphology.",

{
  type: "Journal Article", group: "2025", order: 0,
  authors: "Mohammadirad, Masoud",
  title: "A corpus-based analysis of object indexing in Hewramî",
  abstract: "Hewramî (ISO 639-3) is an Iranic language featuring tense-sensitive alignment, characterised in terms of indexing by employing two sets of bound person markers for expressing direct objects. In TAM categories based on past stem verbs, the direct object is expressed by suffixal person/number morphology. However, the index may be absent under certain conditions. This article explores object indexing in Hewramî, considering its token frequency in discourse and factors conditioning differential object indexing (DOI). The data come from two spoken corpora of over 35,000 words from the Tekht variety of Hewramî. The corpus data were annotated for factors such as animacy, identifiability, person of the referent and textual givenness. The data provide some support for the complementarity hypothesis, meaning that agreement markers slightly favour zero object arguments. The most decisive factor triggering the lack of indexing with overt Os is the co-optation of the agreement slot by a higher-ranked argument. But when taking semantic-referential features into account, the person of the object referent strongly predicts differential object indexing. With the direct object being 3pl and the NP modified, animacy predicts DOI.",

  title: "Typology of verbal person/number syncretism in Western Iranian languages",
  abstract: "This article studies variability in the internal structure of verbal bound person-number paradigms within a sample of 174 Western Iranic language varieties. Twenty-one patterns of syncretism are found within the sample, highlighting the neutralization of opposition between cells in the inflectional person/number paradigm. The syncretic patterns in these languages range from complete opposition in the person/number paradigm to partial syncretism in certain feature values, diagonal systems, and the complete neutralization of person, attested in the Koçerî variety of Northern Kurdish. The article reflects on the effect of sound change, analogy, and areal and contact factors in developing syncretic person-number patterns within Iranic.",

{
  type: "Journal Article", group: "2025", order: 0,
  authors: "Mohammadirad, Masoud and Shuan Karim",
  title: "The development of imperfective and subjunctive marking in Hewramî",
  abstract: "Contemporary dialects of Goranî (a Northwestern Iranic language spoken in Kurdistan) exhibit considerable variation in the formation of tense-aspect-mood categories. It has long been recognized that compatibility of the indicative/imperfective prefix mi- or the subjunctive prefix bi- with present-tense verb stems is phonologically conditioned. However, all attempts to identify the specific conditioning environments have failed. In this article, we reexamine the diachronic development of these affixes, showing that subsequent sound changes have obscured the original conditioning environment for the retention of these affixes. Early work on Hewramî (the main variety of Goranî) shows how the pattern of verbs that have lost the prefixes has begun to be extended to the verbs that take these prefixes for synchronically opaque reasons. The least frequent of these verbs were the first to begin the process of extension, showing inconsistent marking in these early works. Moreover, younger generations continue this process of extension using many more unmarked verbs compared to older speakers. The findings of this paper have implications for cyclic developments in the domain of tense and aspect.",

{
  type: "Journal Article", group: "2025", order: 0,
  authors: "Mohammadirad, Masoud",
  title: "Gorani substrate within Kurdish: Evidence from Southern dialects of Central Kurdish",
  abstract: "The traditional view within Kurdish linguistics is that the split between Central Kurdish (CK) and Northern Kurdish (NK) is mainly the result of a Gorani substrate within the former group. More recent studies refute this hypothesis, arguing instead that Kurdish was initially composed of two distinct but closely related subgroups and that the differences between CK and NK are partly due to distinct source languages and partly due to ensuing contact with neighbouring languages. This study aims to shed new light on the Gorani-substrate hypothesis within CK by examining a corpus-based study of the southernmost CK dialects located within the historical Gorani heartland. Combining recent historical accounts of language shift from Gorani to CK in the region with linguistic data, the paper claims that (i) Gorani borrowings and substrate features reflect different layers of historical contact in Southern CK dialects and (ii) the Gorani substrate has caused a split in the morphosyntactic features across vernaculars of CK, showcasing second-language learning in shaping the historically recent development of Southern CK dialects.",
  venue: "<i>Journal of Historical Linguistics</i> 15(3): 426–462",

{
  type: "Journal Article", group: "2025", order: 0,
  authors: "Anderson, Cormac, Matthew Scarborough, Lechosław Jocz, Martin Joachim Kümmel, Thomas Jügel, Britta Irslinger, Roland Pooth, Henrik Liljegren, Richard F. Strand, Geoffrey Haig, Masoud Mohammadirad, et al.",
  title: "The Indo-European Cognate Relationships Dataset",
  abstract: "The Indo-European Cognate Relationships (IE-CoR) dataset is an open-access relational dataset showing how related, inherited words (‘cognates’) pattern across 160 languages of the Indo-European family. IE-CoR is intended as a benchmark dataset for computational research into the evolution of the Indo-European languages. It is structured around 170 reference meanings in core lexicon, and contains 25731 lexeme entries, analysed into 4981 cognate sets. Novel, dedicated structures are used to code all known cases of horizontal transfer. All 13 main documented clades of Indo-European, and their main subclades, are well represented. Time calibration data for each language are also included, as are relevant geographical and social metadata. Data collection was performed by an expert consortium of 89 linguists drawing on 355 cited sources. The dataset is extendable to further languages and meanings and follows the Cross-Linguistic Data Format (CLDF) protocols for linguistic data. It is designed to be interoperable with other cross-linguistic datasets and catalogues, and provides a reference framework for similar initiatives for other language families.",

{
  type: "Journal Article", group: "2025", order: 0,
  authors: "Mohammadirad, Masoud and Ergin Öpengin",
  title: "Lenition of voiced stops across Kurdish",
  abstract: "Contemporary Kurdish variety groups exhibit considerable variation with respect to the lenition of voiced stops. This paper presents a first systematic overview of lenition across major varieties of Kurdish, drawing on published data and a recent questionnaire developed for studying phonological variation within Kurdish. Following recent studies on lenition, a distinction is made between lenition as a process related to earlier stages of language and lenition as a synchronically active process. Analysing diachronic sound changes in Kurdish as well as the synchronic lenition phenomena in its dialects, we conclude that while at earlier stages, Kurdish varieties favoured the lenition of voiced stops across different phonological environments, synchronically, lenition of voiced stops tends to be phonologically active only in the southernmost dialects of Central Kurdish and neighbouring Southern Kurdish and Gorani dialects, and with a limited extent, in the westernmost outliers of Northern Kurdish. It is argued that the synchronic lenition in the Gorani contact zone arose through innovation in Gorani and spread to Kurdish through substratum interference or originated in diffusion from Southern Kurdish.",

{
  type: "Journal Article", group: "2024", order: 0,
  authors: "Mohammadirad, Masoud",
  title: "External possession constructions in Laki",
  abstract: "Some Western Iranian languages exhibit external possession constructions, represented by a bound pronoun on the verb. This reflects a historical construction in which the possessive NP is the direct object of a past-tense transitive construction. Additionally, Laki features an external possession construction that is peculiar to this language, in which the possessor is a 3SG bound pronoun originating from historical genitive/dative clitics. This construction cuts across the tense and transitivity of the clause and deviates from the expected cross-linguistic patterns in several respects: (i) the external possessor is restricted to the third person; (ii) it occurs regularly with stative predicates, e.g. copula constructions, and hence external possession cannot be explained by the affectedness condition alone; (iii) the body is a crucial domain for the accessibility of external possession, overshadowing the affectedness condition. Providing evidence from an understudied language, the findings of this paper expand the typology of external possession.",

{
  type: "Journal Article", group: "2021", order: 0,
  authors: "Mohammadirad, Masoud and Pollet Samvelian",
  title: "Procliticization as a residual of second positioning: Evidence from West Iranian languages",
  abstract: "Person clitics show proclitic attachment in some West Iranian languages. Nevertheless, most of the literature has continued to focus on enclitics. This paper provides evidence that a good number of modern languages have developed proclitics, presumably from the middle Iranian period onward. Using synchronic data from modern languages gathered in the field, and contrasting it with the Middle Iranian period and current clausal second-position clitic systems, we develop some hypotheses regarding the rise of proclitics in modern languages. We argue that proclitic attachment has resulted from the reanalysis and/or the loss of clause-initial clitic hosting particles of the Middle Iranian period, and the actualization of the stray clitic as a proclitic on some host to the right. This trajectory from second position enclitics to proclitics, which is also attested in Old Romance and Uto-Aztecan, is argued to have been triggered by head attraction and rightward drift of clitics from clause-second position toward the verb in modern languages, giving rise to VP-based and Verb-based cliticization systems.",

{
  type: "Journal Article", group: "2020", order: 1,
  authors: "Mohammadirad, Masoud",
  title: "Predicative possession across Western Iranian languages",
  abstract: "This paper offers a first systematic investigation of predicative possessive constructions across Western Iranian languages. The notion of possession is conceived as a prototypical domain. It is shown that investigated languages are classified into two major areally distributed groups with respect to predicative possessive constructions: (i) “be”-verb languages, (ii) “have”-verb languages. “Have”-possessives, which originated from “action schema”, are argued to have superseded the archaic “be”-possessives, which trigger a non-canonical marking of the possessor argument. However, “have”-verb languages have preserved relics of the older “be”-possessive in some neighbouring domains to possession. In addition, two languages exhibit possession split and are in transition from “be”-possession to “have”-possession: these languages demonstrate the effect of alienability/inalienability in such a split.",

{

  authors: "Anonby, Erik, Mortaza Taheri-Ardali, Laurentia Schreiber, Christiane Bulut, Geoffrey Haig, Peiman Pishyar Dehkordi, Mahnaz Talebi-Dastenaei, Fatemeh Shahverdi, Hossein Hashemi Zarajabad, Masoud Mohammadirad, et al.",
  title: "Turkic languages in the Atlas of the Languages of Iran (ALI)",
  abstract: "The Atlas of the Languages of Iran (ALI), initiated in 2014, is a long-term research programme that aims to develop a comprehensive overview of the language situation in Iran, with attention to the distribution of language varieties, their structural characteristics, and relationships among the varieties. The Atlas deals with all languages of Iran, and since Turkic-speaking communities are found in most provinces, the Turkic language family features prominently. In this article, we look at three important issues relating to Turkic in the Atlas, in the order that they have been initiated in the research process. First, we present the ongoing classification of Turkic languages in Iran as a scientific frame, serving as both foundation and key goal of the research. Second, we describe our initial approach to Turkic language communities through a systematic inquiry into language distribution and the collection of local place names. Third, we provide an inventory of Turkic linguistic questionnaire data collected and analyzed up to now, along with an overview of results. The paper concludes with reflections on progress, challenges, and future directions in the documentation of Iran's Turkic languages in the context of the ALI programme.",

{
  type: "Journal Article", group: "2018", order: 0,
  authors: "Mohammadirad, Masoud and Mohammad Rasekh-Mahand",
  title: "Functions of the dative: An Iranian perspective",
  abstract: "In this paper, we give an account of dative functions in a number of Iranian languages from a typological perspective. To analyze the functionality of dative markers in the selected languages, we follow a semantic map approach and take Haspelmath’s map of dative functions as a typological grid to examine our data. We collected our data from descriptive grammars and, for Ossetic and Wakhi, from interviews. The data show that five additional connections should be added to the semantic map of dative functions; these connections are confirmed by data from at least three languages within the Iranian language family. The main semantic property for the dative in Iranian languages is indirect affectedness. Moreover, in some languages spatial functions of the dative are also attested. The distribution of dative functions is mainly explained by the preservation of the oblique case and the areal distribution. In addition, in some languages, a grammaticalization cycle is observed, as a result of which purportedly beneficiary markers are transforming into dative markers.",

{
  type: "Journal Article", group: "2017", order: 0,
  authors: "Mohammadirad, Masoud and Mohammad Rasekh-Mahand",
  title: "Instrumental semantic map in Western Iranian languages",
  abstract: "This paper aims to study instrumental related functions in some Western Iranian languages. The data were collected from descriptive grammars, and interviews in some cases. Narrog’s instrumental semantic map is the basis for analyzing polysemy patterns in these languages. The data show that two main polysemy patterns are attested: (1) Instrumental and companion functions are coded alike. (2) They are coded differently. These two patterns are distributed areally. Furthermore, some languages are shifting/have shifted between these two types mainly as a result of contact-induced matters. In languages in which two or more functions are not directly connected, one marker generally has both instrumental and dative functions.",

  abstract: "This chapter is an overview of narrative style and discourse strategies in Kurdish and Neo-Aramaic oral literature, show-casing convergence in storytelling techniques among ethno-religiously distinct neighbouring communities. Kurdish and Neo-Aramaic narrative discourse shows parallels in poetic, formulaic and figurative language as well as in its structural organisation. The chapter also contextualises these hallmarks from an areal perspective. Examples have been taken from the collection of texts in the second volume and include shared opening and closing formulae, idioms, fillers, proverbs, ideo-phones, onomatopoeias as well as syntactic stylistics such as repetition, inversion, and narrative verbal forms. The organi-sation of discourse is similar in the use of repetition and tail-head linkage for event cohesion, thematisation etc., the use of the verb ‘to rise’ to serve as discourse connective, the functions of additive particles, as well zero anaphora. A few features, such as the use of the additive markers, are typical of Aramaic-Kurdish bilinguals and indicative of Kurdish influence on Ar-amaic, while the use of verb ‘to rise’ in Kurdish indicates the influence of Semitic on Kurdish. Several traits are shared also more widely with Armenian, Arabic (Levantine, Mesopotami-an), Iranian (Gorani, Persian), and Turkic (Turkish, Azeri). Other features, the opening and closing formulae in particular, have been subject to diffusion in an area spanning from Iran to Eastern Europe. Finally, a number of these techniques. e.g., repetition, sound symbolism, are characteristics of oral narra-tives in general.",

<script id="pub-app">
/* ============================================================
   Rendering: the page is sorted by year by default (regardless of
   type), with a small type badge on each entry. Clicking a type
   pill narrows the list to just that type (still sorted by year);
   clicking the active pill again returns to the full year-sorted list.
   ============================================================ */
const TYPE_ORDER = ["Dissertation", "Book", "Journal Article", "Book Chapter", "Archival Entry"];

let activeType = "All";
let searchQuery = "";

function stripHtml(html) {
  return (html || "").replace(/<[^>]+>/g, "");
}

function matchesSearch(p, q) {
  if (!q) return true;
  const haystack = [p.title, p.authors, stripHtml(p.venue), p.group, p.status || "", p.abstract || ""]
    .join(" ").toLowerCase();
  return haystack.includes(q.toLowerCase());
}

function getYearGroups(items) {
  const forthcoming = items
    .filter(p => p.group === "Forthcoming")
    .sort((a, b) => (a.order || 0) - (b.order || 0));

  const byYear = {};
  items.forEach(p => {
    if (p.group !== "Forthcoming") {
      (byYear[p.group] = byYear[p.group] || []).push(p);
    }
  });

  const years = Object.keys(byYear).sort((a, b) => Number(b) - Number(a));
  const groups = [];
  if (forthcoming.length) groups.push({ label: "Forthcoming", items: forthcoming });
  years.forEach(y => {
    groups.push({
      label: y,
      items: byYear[y].sort((a, b) => (a.order || 0) - (b.order || 0))
    });
  });
  return groups;
}

function renderEntry(p) {
  const div = document.createElement("div");
  div.className = "pub-entry";

  const links = p.links || [];
  const hasAbstract = !!(p.abstract && p.abstract.trim());
  let abstractToggle = null;

  // ---- Card header: red type pill (left) + action icons (right) ----
  const header = document.createElement("div");
  header.className = "pub-card-header";

  const typePill = document.createElement("span");
  typePill.className = "pub-type-pill";
  typePill.textContent = p.type;
  header.appendChild(typePill);

  const actions = document.createElement("span");
  actions.className = "pub-card-actions";
  links.forEach(l => {
    const a = document.createElement("a");
    a.className = "pub-btn";
    a.href = l.url;
    a.target = "_blank";
    a.rel = "noopener";
    a.title = l.label;
    const i = document.createElement("i");
    i.className = "fas " + l.icon;
    a.appendChild(i);
    actions.appendChild(a);
  });
  if (p.bibtex) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "pub-btn";
    btn.title = "BibTeX citation";
    const i = document.createElement("i");
    i.className = "fas fa-quote-right";
    btn.appendChild(i);
    btn.addEventListener("click", () => openBibtex(p.bibtex));
    actions.appendChild(btn);
  }
  if (hasAbstract) {
    abstractToggle = document.createElement("button");
    abstractToggle.type = "button";
    abstractToggle.className = "pub-chevron-btn";
    abstractToggle.title = "Show abstract";
    const i = document.createElement("i");
    i.className = "fas fa-chevron-down";
    abstractToggle.appendChild(i);
    actions.appendChild(abstractToggle);
  }
  header.appendChild(actions);
  div.appendChild(header);

  // ---- Title ----
  const titleDiv = document.createElement("div");
  titleDiv.className = "pub-title";
  if (p.status) {
    const badge = document.createElement("span");
    badge.className = "pub-status";
    badge.textContent = p.status;
    titleDiv.appendChild(badge);
  }
  if (p.titleUrl) {
    const a = document.createElement("a");
    a.href = p.titleUrl;
    a.target = "_blank";
    a.rel = "noopener";
    a.textContent = p.title;
    titleDiv.appendChild(a);
  } else {
    titleDiv.appendChild(document.createTextNode(p.title));
  }
  div.appendChild(titleDiv);

  const authorsDiv = document.createElement("div");
  authorsDiv.className = "pub-authors";
  authorsDiv.textContent = p.authors;
  div.appendChild(authorsDiv);

  if (p.venue) {
    const venueDiv = document.createElement("div");
    venueDiv.className = "pub-venue";
    venueDiv.innerHTML = p.venue;
    div.appendChild(venueDiv);
  }

  if (hasAbstract) {
    const abstractDiv = document.createElement("div");
    abstractDiv.className = "pub-abstract";
    abstractDiv.textContent = p.abstract;
    abstractDiv.style.display = "none";
    div.appendChild(abstractDiv);

    abstractToggle.addEventListener("click", () => {
      const open = abstractDiv.style.display === "none";
      abstractDiv.style.display = open ? "block" : "none";
      abstractToggle.title = open ? "Hide abstract" : "Show abstract";
      abstractToggle.classList.toggle("open", open);
    });
  }

  return div;
}

function render() {
  const root = document.getElementById("pubRoot");
  root.innerHTML = "";

  const items = PUBLICATIONS.filter(p =>
    (activeType === "All" || p.type === activeType) && matchesSearch(p, searchQuery)
  );

  getYearGroups(items).forEach(group => {
    const h2 = document.createElement("h2");
    h2.className = "year-heading";
    h2.textContent = group.label;
    root.appendChild(h2);
    group.items.forEach(p => root.appendChild(renderEntry(p)));
  });

  if (items.length === 0) {
    root.innerHTML = '<p class="empty-note">No publications match your search.</p>';
  }

  document.getElementById("resultsCount").textContent =
    activeType === "All"
      ? `Showing ${items.length} of ${PUBLICATIONS.length} publications`
      : `Showing ${items.length} of ${PUBLICATIONS.length} publications · ${activeType}`;
}

function makePill(label, count, isActive, onClick) {
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "filter-pill" + (isActive ? " active" : "");
  btn.textContent = `${label} (${count})`;
  btn.addEventListener("click", onClick);
  return btn;
}

function renderPills() {
  const wrap = document.getElementById("filterPills");
  wrap.innerHTML = "";

  wrap.appendChild(makePill("All", PUBLICATIONS.length, activeType === "All", () => {
    activeType = "All";
    renderPills();
    render();
  }));

  TYPE_ORDER.forEach(type => {
    const count = PUBLICATIONS.filter(p => p.type === type).length;
    wrap.appendChild(makePill(type, count, activeType === type, () => {
      activeType = (activeType === type) ? "All" : type;
      renderPills();
      render();
    }));
  });
}

document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value;
  render();
});

renderPills();
render();
</script>
