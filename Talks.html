<script id="talk-app">
const TYPE_ORDER=["Paper","Invited Talk", "Workshop", "Poster"];
let activeType="All",searchQuery="";
function matchesSearch(t,q){if(!q)return true;return[t.title,t.authors,t.venue,t.group,t.date||""].join(" ").toLowerCase().includes(q.toLowerCase())}
function getYearGroups(items){const by={};items.forEach(t=>(by[t.group]=by[t.group]||[]).push(t));return Object.keys(by).sort((a,b)=>Number(b)-Number(a)).map(y=>({label:y,items:by[y].sort((a,b)=>(b.month||0)-(a.month||0))}))}
function renderEntry(t){
  const div=document.createElement("div");div.className="pub-entry";
  const hdr=document.createElement("div");hdr.className="pub-card-header";
  const pill=document.createElement("span");pill.className="pub-type-pill";pill.textContent=t.type;hdr.appendChild(pill);
  const acts=document.createElement("div");acts.className="pub-card-actions";
  (t.links||[]).forEach(l=>{const a=document.createElement("a");a.className="pub-btn";a.href=l.url;a.target="_blank";a.rel="noopener";a.title=l.label;const i=document.createElement("i");i.className="fas "+l.icon;a.appendChild(i);acts.appendChild(a)});
  if(t.bibtex){const b=document.createElement("button");b.type="button";b.className="pub-btn";b.title="BibTeX citation";const i=document.createElement("i");i.className="fas fa-quote-right";b.appendChild(i);b.addEventListener("click",()=>openBibtex(t.bibtex));acts.appendChild(b)}
  hdr.appendChild(acts);div.appendChild(hdr);
  const dd=document.createElement("div");dd.className="talk-date";dd.textContent=t.date;div.appendChild(dd);
  const td=document.createElement("div");td.className="pub-title";td.textContent=t.title;div.appendChild(td);
  const ad=document.createElement("div");ad.className="pub-authors";ad.textContent=t.authors;div.appendChild(ad);
  if(t.venue){const vd=document.createElement("div");vd.className="pub-venue";vd.textContent=t.venue;div.appendChild(vd)}
  return div}
function render(){
  const root=document.getElementById("talkRoot");root.innerHTML="";
  const items=TALKS.filter(t=>(activeType==="All"||t.type===activeType)&&matchesSearch(t,searchQuery));
  getYearGroups(items).forEach(g=>{const h=document.createElement("h2");h.className="year-heading";h.textContent=g.label;root.appendChild(h);g.items.forEach(t=>root.appendChild(renderEntry(t)))});
  if(!items.length)root.innerHTML='<p class="empty-note">No talks match your search.</p>';
  document.getElementById("resultsCount").textContent=activeType==="All"?`Showing ${items.length} of ${TALKS.length} talks`:`Showing ${items.length} of ${TALKS.length} talks · ${activeType}`}
function makePill(label,count,isActive,onClick){const b=document.createElement("button");b.type="button";b.className="filter-pill"+(isActive?" active":"");b.textContent=`${label} (${count})`;b.addEventListener("click",onClick);return b}
function renderPills(){
  const wrap=document.getElementById("filterPills");wrap.innerHTML="";
  wrap.appendChild(makePill("All",TALKS.length,activeType==="All",()=>{activeType="All";renderPills();render()}));
  TYPE_ORDER.forEach(type=>{const c=TALKS.filter(t=>t.type===type).length;wrap.appendChild(makePill(type,c,activeType===type,()=>{activeType=(activeType===type)?"All":type;renderPills();render()}))})}
document.getElementById("searchInput").addEventListener("input",e=>{searchQuery=e.target.value;render()});
renderPills();render();
</script>
